<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Play</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial, sans-serif;
  background: radial-gradient(circle, #1a1a1a, #000);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* CARD */
.container{
  width:100%;
  max-width:360px;
  background:#111;
  padding:25px;
  border-radius:16px;
  box-shadow:0 0 25px rgba(255,0,85,0.3);
  text-align:center;
}

/* TITLE */
.title{
  color:#fff;
  font-size:20px;
  margin-bottom:15px;
}

/* BUTTON BASE */
.btn{
  display:block;
  width:100%;
  padding:16px;
  margin:12px 0;
  color:#fff;
  text-decoration:none;
  font-size:17px;
  font-weight:bold;
  border-radius:50px;
  transition:0.4s;
  position:relative;
  overflow:hidden;
  letter-spacing:1px;
}

/* EFEK KILAU */
.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:60%;
  height:100%;
  transform:skewX(-25deg);
  background:rgba(255,255,255,0.35);
}

.btn:hover::before{
  animation:shine 0.8s ease;
}

.btn:hover{
  transform:translateY(-3px);
}

/* BUTTON UTAMA PREMIUM GOLD */
.btn-main{
  background:linear-gradient(
    180deg,
    #ff2a2a,
    #d60000,
    #9c0000
  );
  box-shadow:
    0 0 15px rgba(255,0,0,.7),
    0 0 30px rgba(255,0,0,.4);
  animation:pulse 1.5s infinite;
}

/* EFEK HOVER */
.btn-main:hover{
  transform:translateY(-3px) scale(1.03);
  box-shadow:
    0 0 25px rgba(212,175,55,.9),
    0 0 45px rgba(212,175,55,.6);
}

/* ANIMASI GOLD */
@keyframes goldGlow{
  0%,100%{
    box-shadow:
      0 0 15px rgba(212,175,55,.7),
      0 0 30px rgba(212,175,55,.4);
  }

  50%{
    box-shadow:
      0 0 25px rgba(255,215,0,.9),
      0 0 50px rgba(212,175,55,.7);
  }
}

</style>
</head>

<body>

<div class="container">

<div class="title">🔥 Video Below  🔥</div>
