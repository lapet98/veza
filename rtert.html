<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top,#2a2a2a,#0b0b0b 60%);
    font-family:'Segoe UI',sans-serif;
}

.premium-btn{
    position:relative;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:18px 50px;
    text-decoration:none;
    font-size:18px;
    font-weight:700;
    letter-spacing:1px;
    color:#f8e7a1;

    background:rgba(255,255,255,.05);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,215,0,.25);
    border-radius:60px;

    box-shadow:
        0 0 0 1px rgba(255,215,0,.1),
        0 10px 30px rgba(0,0,0,.6),
        inset 0 1px 1px rgba(255,255,255,.1);

    overflow:hidden;
    transition:.4s ease;
}

.premium-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-150%;
    width:70%;
    height:100%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.3),
        transparent
    );

    transform:skewX(-25deg);
}

.premium-btn:hover::before{
    left:180%;
    transition:1s;
}

.premium-btn:hover{
    transform:translateY(-4px);
    border-color:#ffd700;

    box-shadow:
        0 0 25px rgba(255,215,0,.2),
        0 15px 40px rgba(0,0,0,.8),
        inset 0 1px 1px rgba(255,255,255,.2);
}

.premium-btn:active{
    transform:scale(.98);
}

.play-icon{
    font-size:20px;
    color:#ffd700;
}

.gold-line{
    position:absolute;
    inset:0;
    border-radius:60px;
    padding:1px;
    background:linear-gradient(
        135deg,
        #fff5c3,
        #ffd700,
        #a97800,
        #fff5c3
    );
    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
}
</style>
</head>
<body>

<a href="#" class="premium-btn">
    <div class="gold-line"></div>
    <span class="play-icon">▶</span>
    WATCH NOW
</a>

</body>
</html>
