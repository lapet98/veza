<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial, sans-serif;
background:
radial-gradient(circle at top,#35101f 0%,#0b0b0b 35%,#000 100%);  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* CARD */
.container{
    width:100%;
    max-width:380px;

    padding:30px;

    background:
    linear-gradient(
        145deg,
        rgba(15,15,15,.98),
        rgba(5,5,5,.98)
    );

    border-radius:24px;

    border:1px solid rgba(255,215,0,.15);

    backdrop-filter:blur(12px);

    box-shadow:
        0 0 40px rgba(255,215,0,.08),
        0 0 80px rgba(255,0,85,.18),
        0 25px 60px rgba(0,0,0,.75);

    position:relative;
    overflow:hidden;

    text-align:center;
}

.container::before{
    content:"";
    position:absolute;
    top:-150%;
    left:-50%;

    width:80%;
    height:400%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,215,0,.08),
        transparent
    );

    transform:rotate(25deg);

    animation:glassMove 8s linear infinite;
}

@keyframes glassMove{
    0%{
        transform:translateX(-300px) rotate(25deg);
    }
    100%{
        transform:translateX(500px) rotate(25deg);
    }
}



/* TITLE */
.title{
  color:#fff;
  font-size:20px;
  margin-bottom:15px;
}

/* BUTTON BASE */
.elite-btn{
    position:relative;
    width:100%;
    height:68px;

    display:flex;
    justify-content:center;
    align-items:center;

    margin:15px 0;

    text-decoration:none;
    overflow:hidden;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #0a0a0a,
        #1b1b1b,
        #0a0a0a
    );

    border:1px solid rgba(255,215,0,.3);

    color:#ffffff;
    font-size:18px;
    font-weight:700;
    letter-spacing:1.5px;

    box-shadow:
        0 10px 30px rgba(0,0,0,.6),
        0 0 20px rgba(255,215,0,.12);

    transition:.4s ease;
}

.elite-btn::before{
    content:"";
    position:absolute;
    inset:-2px;

    background:
    linear-gradient(
        90deg,
        transparent,
        #ffd700,
        #fff,
        #ffd700,
        transparent
    );

    background-size:300% 100%;

    border-radius:20px;

    animation:borderFlow 4s linear infinite;

    z-index:0;
}

.elite-btn::after{
    content:"";
    position:absolute;
    inset:2px;

    background:
    linear-gradient(
        180deg,
        #1a1a1a,
        #090909
    );

    border-radius:16px;

    z-index:1;
}

.elite-btn span{
    position:relative;
    z-index:2;

    text-shadow:
        0 0 10px rgba(255,255,255,.15);
}

.elite-btn span::before{
    content:"";
    position:absolute;
    top:-25px;
    left:-120px;

    width:40px;
    height:120px;

    background:rgba(255,255,255,.4);

    transform:rotate(25deg);

    filter:blur(8px);

    animation:shine 3s infinite;
}

.elite-btn:hover{
    transform:translateY(-4px);

    box-shadow:
        0 15px 40px rgba(0,0,0,.8),
        0 0 35px rgba(255,215,0,.25);
}

@keyframes borderFlow{
    0%{
        background-position:0% 50%;
    }
    100%{
        background-position:300% 50%;
    }
}

@keyframes shine{
    0%{
        left:-120px;
    }
    100%{
        left:350px;
    }
}

</style>
</head>

<body>

<div class="container">

<div class="title">🔥 VIDEO VIRAL  🔥</div>
