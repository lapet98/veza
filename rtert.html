<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:Arial,sans-serif;
}

.btn-play{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:16px 40px;
    font-size:18px;
    font-weight:bold;
    text-decoration:none;
    color:#fff;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    border-radius:50px;
    box-shadow:0 0 20px rgba(0,114,255,.5);
    transition:.3s;
    overflow:hidden;
}

.btn-play::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.4),
        transparent
    );
    transition:.6s;
}

.btn-play:hover::before{
    left:100%;
}

.btn-play:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 0 35px rgba(0,114,255,.8);
}

.btn-play:active{
    transform:scale(.97);
}

.icon{
    font-size:20px;
}
</style>
</head>
<body>

<a href="https://contoh-link.com" class="btn-play">
    <span class="icon">▶</span>
    PLAY NOW
</a>

</body>
</html>
