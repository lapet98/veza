<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial, sans-serif;
  background: radial-gradient(circle, #1a1a1a, #000);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* CARD */
.container{
  width:100%;
  max-width:360px;
  background:#111;
  padding:25px;
  border-radius:16px;
  box-shadow:0 0 25px rgba(255,0,85,0.3);
  text-align:center;
}

/* TITLE */
.title{
  color:#fff;
  font-size:20px;
  margin-bottom:15px;
}

/* BUTTON BASE */
.btn{
  display:block;
  width:100%;
  padding:16px;
  margin:12px 0;
  color:#fff;
  text-decoration:none;
  font-size:17px;
  font-weight:bold;
  border-radius:50px;
  transition:0.4s;
  position:relative;
  overflow:hidden;
  letter-spacing:1px;
}

/* EFEK KILAU */
.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:60%;
  height:100%;
  transform:skewX(-25deg);
  background:rgba(255,255,255,0.35);
}

.btn:hover::before{
  animation:shine 0.8s ease;
}

.btn:hover{
  transform:translateY(-3px);
}

/* BUTTON UTAMA */
.btn-main{
  background:linear-gradient(135deg,#00b4ff,#0047ff);
  box-shadow:
    0 0 10px rgba(0,180,255,.8),
    0 0 25px rgba(0,120,255,.6);
  animation:floatGlow 2s ease-in-out infinite;
}

/* BUTTON KEDUA */
.btn-second{
  background:linear-gradient(135deg,#6a11cb,#2575fc);
}

/* BUTTON KETIGA */
.btn-third{
  background:linear-gradient(135deg,#00c853,#64dd17);
}

/* ANIMASI KILAU */
@keyframes shine{
  from{
    left:-120%;
  }
  to{
    left:150%;
  }
}

/* ANIMASI GLOW */
@keyframes floatGlow{
  0%,100%{
    transform:translateY(0);
    box-shadow:
      0 0 10px rgba(0,180,255,.8),
      0 0 25px rgba(0,120,255,.6);
  }

  50%{
    transform:translateY(-4px);
    box-shadow:
      0 0 20px rgba(0,180,255,1),
      0 0 40px rgba(0,120,255,.9);
  }
}

</style>
</head>

<body>

<div class="container">

<div class="title">🔥 Video Below  🔥</div>
